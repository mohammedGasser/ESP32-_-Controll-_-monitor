<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Dashboard</title>
<span id="value">0</span>
<script src="js/dashboard1.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#07131c;
    color:white;
}

header{
    height:70px;
    background:#00bcd4;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
}

header h2{
    color:white;
}

header a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

.container{
    width:95%;
    margin:25px auto;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#0f202d;
    border:1px solid #00bcd4;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,255,.15);
}

.card h3{
    color:#00e5ff;
    margin-bottom:10px;
}

.value{
    font-size:35px;
    color:#00ff99;
    font-weight:bold;
}

.section{
    margin-top:35px;
}

.graph{
    background:#0f202d;
    border:1px solid #00bcd4;
    border-radius:15px;
    padding:20px;
}

canvas{
    width:100%;
    height:250px;
    background:black;
    border-radius:10px;
}
</style>

</head>
<body>

<header>
    <h2>Spectrum Dashboard</h2>

    <a href="index.html">⬅ Back</a>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Frequency</h3>
<div class="value" id="frequency">0 kHz</div>
</div>

    <div class="card">
<h3>Amplitude</h3>
<div class="value" id="amplitude">0%</div>
</div>
 

<div class="card">
<h3>Status</h3>
<div class="value">Running</div>
</div>

</div>

<div class="section">

<div class="graph">

<h3 style="margin-bottom:20px;color:#00e5ff;">
Spectrum Analyzer
</h3>

<canvas id="canvas" width="1000" height="250"></canvas>

</div>

</div>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

let bars=50;

for(let i=0;i<bars;i++){

let h=Math.random()*180;

ctx.fillStyle=`rgb(${50+i*4},255,255)`;

ctx.fillRect(
i*20+8,
220-h,
14,
h
);

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
